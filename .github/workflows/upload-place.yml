name: Upload Roblox Place

on:
  push:
    paths:
      - 'place.rbxlx'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload with curl XML
        id: curl-xml
        continue-on-error: true
        run: |
          curl --verbose --location --request POST \
            "https://apis.roblox.com/universes/v1/34505142/places/58857285/versions?versionType=Published" \
            --header "x-api-key: " \
            --header 'Content-Type: application/xml' \
            --data-binary '@place.rbxlx' || echo "XML failed"

      - name: Upload with curl octet-stream
        id: curl-octet
        continue-on-error: true
        run: |
          curl --verbose --location --request POST \
            "https://apis.roblox.com/universes/v1/34505142/places/58857285/versions?versionType=Published" \
            --header "x-api-key: " \
            --header 'Content-Type: application/octet-stream' \
            --data-binary '@place.rbxlx' || echo "Octet failed"

      - name: Upload with Python
        id: python-upload
        continue-on-error: true
        run: |
          python3 -c '
          import requests
          import sys
          with open("place.rbxlx", "rb") as f:
              data = f.read()
          headers = {
              "x-api-key": "",
              "Content-Type": "application/xml"
          }
          r = requests.post("https://apis.roblox.com/universes/v1/34505142/places/58857285/versions?versionType=Published", headers=headers, data=data)
          print("Status:", r.status_code)
          print(r.text)
          if r.status_code == 200:
              print("SUCCESS with XML")
              sys.exit(0)
          ' || echo "Python XML failed"

      - name: Final Status
        run: echo "Kaikki metodit yritetty. Tarkista logi Actions-välilehdeltä."